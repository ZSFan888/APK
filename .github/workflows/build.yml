name: Build APK
on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Target URL
        required: true
      app_name:
        description: App Name
        required: true
      package_name:
        description: Package Name
        required: true
      version_name:
        description: Version Name
        required: true
        default: 1.0.0
      icon_url:
        description: Icon Image URL
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Process icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          pip install Pillow -q
          python3 - <<'EOF'
import urllib.request, os, io
from PIL import Image, ImageDraw
url = os.environ['ICON_URL']
img = None
try:
    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
    with urllib.request.urlopen(req, timeout=15) as r:
        raw = r.read()
    img = Image.open(io.BytesIO(raw)).convert('RGBA')
    print(f'Image OK: {img.format}')
except Exception as e:
    print(f'Failed: {e}')
if img is None:
    img = Image.new('RGBA', (192,192), (66,133,244,255))
print('Icon done')
EOF
