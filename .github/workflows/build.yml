name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "Target URL"
        required: true
      app_name:
        description: "App Name"
        required: true
      package_name:
        description: "Package Name"
        required: true
      version_name:
        description: "Version Name"
        required: true
        default: "1.0.0"
      icon_url:
        description: "Icon Image URL"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.2"

      - run: pip install Pillow

      - name: Inject parameters
        run: |
          sed -i 's|{{APP_URL}}|${{ github.event.inputs.app_url }}|g' \
            app/src/main/java/com/webviewapp/MainActivity.kt

          PKG="${{ github.event.inputs.package_name }}"
          sed -i "s|{{APP_PACKAGE}}|${PKG}|g" \
            app/src/main/AndroidManifest.xml app/build.gradle

          NAME="${{ github.event.inputs.app_name }}"
          sed -i "s|{{APP_NAME}}|${NAME}|g" \
            app/src/main/res/values/strings.xml \
            app/src/main/AndroidManifest.xml

          VER="${{ github.event.inputs.version_name }}"
          VC=$(echo "$VER" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          sed -i "s|{{VERSION_NAME}}|${VER}|g" app/build.gradle
          sed -i "s|{{VERSION_CODE}}|${VC}|g"  app/build.gradle

          PKG_PATH=$(echo "$PKG" | tr '.' '/')
          mkdir -p "app/src/main/java/${PKG_PATH}"
          sed -i "s|package com.webviewapp|package ${PKG}|g" \
            app/src/main/java/com/webviewapp/*.kt
          mv app/src/main/java/com/webviewapp/*.kt \
            "app/src/main/java/${PKG_PATH}/"

      - name: Process icon
        run: |
          pip install Pillow cairosvg -q 2>/dev/null || pip install Pillow -q
          python3 << 'PYEOF'
import urllib.request, os, io
from PIL import Image, ImageDraw

url = "${{ github.event.inputs.icon_url }}"
img = None

try:
    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
    with urllib.request.urlopen(req, timeout=15) as r:
        raw = r.read()
        content_type = r.headers.get("Content-Type", "")
    print(f"Downloaded {len(raw)} bytes, type: {content_type}")
except Exception as e:
    print(f"Download failed: {e}")
    raw = None

if raw:
    # SVG
    if b"<svg" in raw[:512] or "svg" in content_type.lower():
        try:
            import cairosvg
            png_data = cairosvg.svg2png(bytestring=raw, output_width=192, output_height=192)
            img = Image.open(io.BytesIO(png_data)).convert("RGBA")
            print("SVG OK")
        except Exception as e:
            print(f"SVG failed: {e}")

    # 通用格式 PNG/JPG/WEBP/GIF/BMP/ICO 等
    if img is None:
        try:
            img = Image.open(io.BytesIO(raw))
            # ICO 取最大尺寸
            if hasattr(img, 'ico') or getattr(img, 'format', '') == 'ICO':
                sizes = list(img.ico.sizes())
                if sizes:
                    img.size = max(sizes, key=lambda s: s[0])
            img = img.convert("RGBA")
            print(f"Image OK: {img.format} {img.size}")
        except Exception as e:
            print(f"Image open failed: {e}")

# 全部失败用默认纯色图标
if img is None:
    print("Using default icon")
    img = Image.new("RGBA", (192, 192), (66, 133, 244, 255))
    draw = ImageDraw.Draw(img)
    draw.ellipse((20, 20, 172, 172), fill=(255, 255, 255, 200))

for density, size in [("mdpi",48),("hdpi",72),("xhdpi",96),("xxhdpi",144),("xxxhdpi",192)]:
    out  = img.resize((size, size), Image.LANCZOS)
    base = f"app/src/main/res/mipmap-{density}"
    os.makedirs(base, exist_ok=True)
    out.save(f"{base}/ic_launcher.png")
    mask = Image.new("RGBA", (size, size), (0,0,0,0))
    ImageDraw.Draw(mask).ellipse((0,0,size,size), fill=(255,255,255,255))
    result = Image.new("RGBA", (size, size), (0,0,0,0))
    result.paste(out, mask=mask)
    result.save(f"{base}/ic_launcher_round.png")
print("Icon ALL OK")
PYEOF


      - name: Build unsigned APK
        run: gradle assembleRelease --no-daemon

      - name: Find and sign APK
        run: |
          echo "=== APK files found ==="
          find app/build/outputs/apk -name "*.apk" | tee /tmp/apk_list.txt
          UNSIGNED=$(cat /tmp/apk_list.txt | head -1)
          echo "Using: $UNSIGNED"

          # Setup keystore
          KS_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 --decode > /tmp/release.keystore
            KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            echo "Generating debug keystore..."
            keytool -genkey -v \
              -keystore /tmp/release.keystore \
              -alias debugkey -keyalg RSA -keysize 2048 -validity 3650 \
              -storepass android -keypass android \
              -dname "CN=Debug,O=Debug,C=US" -noprompt
            KS_PASS="android"
            KEY_ALIAS="debugkey"
            KEY_PASS="android"
          fi

          keytool -list -keystore /tmp/release.keystore -storepass "$KS_PASS" -noprompt
          echo "Keystore OK"

          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          echo "Build tools: $BUILD_TOOLS"

          $ZIPALIGN -v -p 4 "$UNSIGNED" /tmp/aligned.apk
          $APKSIGNER sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:$KS_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASS" \
            --out /tmp/signed.apk \
            /tmp/aligned.apk
          $APKSIGNER verify /tmp/signed.apk
          echo "Signing OK"

          SAFE=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_')
          VER="${{ github.event.inputs.version_name }}"
          cp /tmp/signed.apk "/tmp/${SAFE}_${VER}.apk"
          echo "APK_PATH=/tmp/${SAFE}_${VER}.apk" >> $GITHUB_ENV
          echo "APK_NAME=${SAFE}_${VER}"           >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 7
