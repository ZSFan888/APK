<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}

/* ── Tokens ── */
:root{
  --bg:#F5F5F5;
  --surface:rgba(255,255,255,0.20);
  --surface-2:rgba(255,255,255,0.32);
  --border:rgba(255,255,255,0.22);
  --border-dark:rgba(0,0,0,0.08);
  --text:#0A0A0A;
  --text-muted:#6B6B6B;
  --text-faint:#AAAAAA;
  --blur:blur(22px) saturate(140%);
  --shadow:0 8px 32px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.60);
  --shadow-lg:0 20px 60px rgba(0,0,0,0.14),0 4px 16px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.50);
  --radius:28px;
  --radius-sm:16px;
  --radius-pill:999px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:-apple-system,'Inter',system-ui,sans-serif;
  --transition:0.30s var(--ease);
}
[data-theme="dark"]{
  --bg:#0A0A0A;
  --surface:rgba(28,28,28,0.52);
  --surface-2:rgba(38,38,38,0.62);
  --border:rgba(80,80,80,0.22);
  --border-dark:rgba(255,255,255,0.06);
  --text:#EDEDED;
  --text-muted:#888;
  --text-faint:#444;
  --shadow:0 8px 32px rgba(0,0,0,0.45),0 2px 8px rgba(0,0,0,0.30),inset 0 1px 0 rgba(255,255,255,0.04);
  --shadow-lg:0 20px 60px rgba(0,0,0,0.60),0 4px 16px rgba(0,0,0,0.40),inset 0 1px 0 rgba(255,255,255,0.03);
}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  transition:background var(--transition),color var(--transition);
  overflow-x:hidden;
}

/* ── Background mesh ── */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(200,200,200,0.22) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%,rgba(180,180,180,0.10) 0%,transparent 60%);
}
[data-theme="dark"] body::before{
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(80,80,80,0.20) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%,rgba(60,60,60,0.14) 0%,transparent 60%);
}

/* ── Header ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:58px;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(245,245,245,0.70);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border-dark);
  transition:background var(--transition),box-shadow var(--transition);
  will-change:transform;
}
[data-theme="dark"] header{background:rgba(10,10,10,0.72)}
header.scrolled{box-shadow:0 1px 28px rgba(0,0,0,0.09)}

.logo{
  display:flex;align-items:center;gap:9px;
  font-size:14px;font-weight:600;letter-spacing:-0.3px;
  color:var(--text);text-decoration:none;
}

/* Logo mark — pure CSS */
.logo-mark{
  width:26px;height:26px;border-radius:8px;
  border:1.5px solid var(--border-dark);
  background:var(--surface);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.logo-mark::before,.logo-mark::after{
  content:'';position:absolute;
  left:50%;width:8px;height:1.5px;
  background:var(--text);border-radius:1px;
}
.logo-mark::before{transform:translateX(-50%) translateY(-3px) rotate(-35deg)}
.logo-mark::after{transform:translateX(-50%) translateY(2px) rotate(-35deg);opacity:0.4}

/* Theme toggle */
.theme-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border-dark);
  color:var(--text);cursor:pointer;
  transition:all 0.25s var(--ease);
}
.theme-btn:hover{background:var(--surface-2);transform:scale(1.06)}

/* Pure CSS sun icon */
.icon-sun,.icon-moon{
  width:14px;height:14px;position:relative;flex-shrink:0;
}
.icon-sun{display:flex;align-items:center;justify-content:center}
.icon-sun::before{
  content:'';width:6px;height:6px;border-radius:50%;
  border:1.5px solid currentColor;
  box-shadow:0 -8px 0 -5.5px currentColor,0 8px 0 -5.5px currentColor,
             8px 0 0 -5.5px currentColor,-8px 0 0 -5.5px currentColor,
             5px 5px 0 -5.5px currentColor,-5px 5px 0 -5.5px currentColor,
             5px -5px 0 -5.5px currentColor,-5px -5px 0 -5.5px currentColor;
}
.icon-moon::before{
  content:'';display:block;width:10px;height:10px;
  border-radius:50%;border:1.5px solid currentColor;
  clip-path:inset(0 0 0 40%);
  transform:rotate(-30deg);
}

/* ── Main ── */
main{
  position:relative;z-index:1;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:96px 20px 80px;
}

/* ── Hero ── */
.hero{text-align:center;margin-bottom:48px;max-width:560px}

.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;
  color:var(--text-muted);
  background:var(--surface);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border-dark);
  padding:5px 14px 5px 10px;border-radius:var(--radius-pill);
  margin-bottom:22px;
}
/* CSS dot indicator */
.eyebrow-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--text-muted);flex-shrink:0;
}

.hero-title{
  font-size:clamp(2rem,5.5vw,3.4rem);
  font-weight:700;letter-spacing:-0.04em;line-height:1.08;
  color:var(--text);margin-bottom:16px;
}
.hero-sub{
  font-size:15px;color:var(--text-muted);line-height:1.75;
  max-width:380px;margin:0 auto;
}

/* ── Glass Card ── */
.card{
  width:100%;max-width:500px;
  background:var(--surface);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:32px 28px;
  position:relative;overflow:hidden;
  transition:box-shadow var(--transition);
  will-change:transform;
}
/* Top highlight line */
.card::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.55),transparent);
  pointer-events:none;
}
[data-theme="dark"] .card::before{
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.10),transparent);
}
/* Corner light spot */
.card::after{
  content:'';position:absolute;
  width:180px;height:180px;top:-60px;right:-40px;
  background:radial-gradient(ellipse at center,rgba(255,255,255,0.11) 0%,transparent 65%);
  pointer-events:none;
}

/* ── Form ── */
.form{display:flex;flex-direction:column;gap:18px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.field{display:flex;flex-direction:column;gap:7px}
.label{
  font-size:11px;font-weight:500;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-muted);
}
.input{
  height:46px;
  background:rgba(255,255,255,0.10);
  border:1px solid var(--border-dark);
  border-radius:var(--radius-sm);
  padding:0 15px;
  font-size:14px;font-family:var(--font);
  color:var(--text);outline:none;
  transition:all 0.22s var(--ease);
  will-change:border-color,box-shadow;
}
[data-theme="dark"] .input{
  background:rgba(255,255,255,0.05);
  border-color:rgba(255,255,255,0.09);
}
.input::placeholder{color:var(--text-faint)}
.input:focus{
  border-color:rgba(0,0,0,0.28);
  background:rgba(255,255,255,0.18);
  box-shadow:0 0 0 3px rgba(0,0,0,0.05);
}
[data-theme="dark"] .input:focus{
  border-color:rgba(255,255,255,0.22);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 0 3px rgba(255,255,255,0.04);
}

/* ── Primary Button ── */
.btn{
  width:100%;height:50px;
  background:#111;color:#FFF;
  border:none;border-radius:var(--radius-pill);
  font-size:14px;font-weight:600;
  font-family:var(--font);letter-spacing:-0.01em;
  cursor:pointer;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform 0.22s var(--ease),box-shadow 0.22s var(--ease),filter 0.22s var(--ease);
  margin-top:4px;
  will-change:transform;
}
[data-theme="dark"] .btn{background:#E8E8E8;color:#0A0A0A}
.btn:hover:not(:disabled){
  transform:scale(1.025);
  filter:brightness(1.10);
  box-shadow:0 10px 28px rgba(0,0,0,0.22);
}
.btn:active:not(:disabled){transform:scale(0.978)}
.btn:disabled{opacity:0.48;cursor:not-allowed}

/* CSS Ripple */
.ripple-el{
  position:absolute;border-radius:50%;pointer-events:none;
  width:120px;height:120px;margin-left:-60px;margin-top:-60px;
  background:radial-gradient(circle,rgba(255,255,255,0.28) 0%,transparent 65%);
  animation:ripple 0.55s var(--ease) forwards;
}
[data-theme="dark"] .ripple-el{
  background:radial-gradient(circle,rgba(0,0,0,0.20) 0%,transparent 65%);
}
@keyframes ripple{
  0%{transform:scale(0);opacity:1}
  100%{transform:scale(4.5);opacity:0}
}

/* CSS Spinner (button loading) */
.spinner{
  width:15px;height:15px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.25);
  border-top-color:rgba(255,255,255,0.90);
  animation:spin 0.65s linear infinite;
}
[data-theme="dark"] .btn .spinner{
  border-color:rgba(0,0,0,0.18);
  border-top-color:rgba(0,0,0,0.75);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* CSS arrow icon for submit btn */
.btn-arrow{
  width:14px;height:14px;position:relative;flex-shrink:0;
}
.btn-arrow::before,.btn-arrow::after{
  content:'';position:absolute;background:currentColor;border-radius:1px;
}
.btn-arrow::before{width:10px;height:1.8px;top:6px;left:0}
.btn-arrow::after{
  width:6px;height:6px;
  border-top:1.8px solid currentColor;
  border-right:1.8px solid currentColor;
  background:transparent;
  top:3px;right:0;
  transform:rotate(45deg);
  border-radius:0;
}

/* ── Status Panel ── */
.status{
  width:100%;max-width:500px;
  margin-top:16px;
  background:var(--surface);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  box-shadow:var(--shadow);
  padding:22px 24px;
  display:none;
  transition:box-shadow var(--transition);
}
.status.show{display:block}

/* Status row */
.status-row{display:flex;align-items:flex-start;gap:11px;margin-bottom:18px}

/* CSS status dot */
.s-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--text-faint);flex-shrink:0;margin-top:4px;
}
.s-dot.running{
  background:var(--text-muted);
  animation:pulse-dot 1.3s ease-in-out infinite;
}
.s-dot.ok{
  background:var(--text);
  position:relative;
}
/* CSS checkmark inside ok dot */
.s-dot.ok::before{
  content:'';position:absolute;
  width:4px;height:2.5px;
  border-left:1px solid var(--bg);
  border-bottom:1px solid var(--bg);
  top:1.5px;left:1.5px;
  transform:rotate(-45deg);
}
.s-dot.fail{background:#888}
@keyframes pulse-dot{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.35;transform:scale(0.75)}
}

.s-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.s-sub{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5}

/* Progress track */
.progress-track{
  height:2px;background:var(--border-dark);
  border-radius:var(--radius-pill);overflow:hidden;margin-bottom:18px;
}
[data-theme="dark"] .progress-track{background:rgba(255,255,255,0.07)}
.progress-fill{
  height:100%;width:0%;background:var(--text);
  border-radius:var(--radius-pill);
  transition:width 1s var(--ease);
}

/* Steps */
.steps{display:flex;flex-direction:column;gap:10px}
.step{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--text-faint);
  transition:color 0.3s var(--ease);
}
.step.active,.step.done{color:var(--text-muted)}

/* CSS step icon */
.step-ico{
  width:16px;height:16px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--text-faint);
  position:relative;transition:all 0.3s var(--ease);
}
.step.active .step-ico{
  border-color:var(--text-muted);
  animation:pulse-dot 1.3s ease-in-out infinite;
}
.step.done .step-ico{
  border-color:var(--text);
  background:var(--text);
}
/* CSS checkmark for done step */
.step.done .step-ico::before,.step.done .step-ico::after{
  content:'';position:absolute;background:var(--bg);border-radius:1px;
}
.step.done .step-ico::before{
  width:6px;height:1.5px;
  top:6px;left:1px;
  transform:rotate(45deg);
}
.step.done .step-ico::after{
  width:4px;height:1.5px;
  top:4.5px;left:4px;
  transform:rotate(-45deg);
}

/* ── Error box ── */
.err{
  font-size:13px;color:#888;
  margin-top:14px;
  padding:10px 14px;
  background:rgba(0,0,0,0.04);
  border:1px solid rgba(0,0,0,0.08);
  border-radius:10px;display:none;
  line-height:1.5;
}
[data-theme="dark"] .err{
  background:rgba(255,255,255,0.04);
  border-color:rgba(255,255,255,0.08);
  color:var(--text-muted);
}
/* CSS warning mark prefix */
.err::before{
  content:'';display:inline-block;
  width:12px;height:12px;border-radius:50%;
  border:1.5px solid #888;
  margin-right:7px;vertical-align:-2px;
  position:relative;
}
.err.show{display:block}

/* ── Download button ── */
.btn-dl{
  width:100%;height:50px;
  background:#111;color:#FFF;
  border:none;border-radius:var(--radius-pill);
  font-size:14px;font-weight:600;
  font-family:var(--font);
  cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:9px;
  margin-top:18px;position:relative;overflow:hidden;
  transition:transform 0.22s var(--ease),filter 0.22s var(--ease),box-shadow 0.22s var(--ease);
}
[data-theme="dark"] .btn-dl{background:#E8E8E8;color:#0A0A0A}
.btn-dl:hover{
  transform:scale(1.025);
  filter:brightness(1.10);
  box-shadow:0 10px 28px rgba(0,0,0,0.22);
}
.btn-dl:active{transform:scale(0.978)}

/* CSS download arrow icon */
.ico-dl{
  width:14px;height:14px;position:relative;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;
}
.ico-dl::before,.ico-dl::after{
  content:'';position:absolute;background:currentColor;border-radius:1px;
}
.ico-dl::before{width:1.8px;height:8px;top:0;left:6px}
/* chevron down */
.ico-dl::after{
  width:8px;height:8px;
  border-bottom:1.8px solid currentColor;
  border-right:1.8px solid currentColor;
  background:transparent;border-radius:0;
  top:3px;left:3px;
  transform:rotate(45deg);
}

/* ── Footer ── */
footer{
  position:relative;z-index:1;
  text-align:center;padding:28px 20px;
  font-size:11px;color:var(--text-faint);letter-spacing:0.02em;
}
/* CSS divider dot */
footer span{display:inline-block;width:3px;height:3px;border-radius:50%;
  background:var(--text-faint);vertical-align:middle;margin:0 8px;}

/* ── Responsive ── */
@media(max-width:540px){
  header{padding:0 18px}
  main{padding:84px 14px 60px}
  .card{padding:24px 18px;border-radius:20px}
  .row{grid-template-columns:1fr}
  .hero-title{font-size:1.9rem}
}
</style>
</head>
<body>

<header id="hdr">
  <a href="#" class="logo">
    <div class="logo-mark" aria-hidden="true"></div>
    APK Builder
  </a>
  <button class="theme-btn" id="themeBtn" aria-label="切换主题">
    <div class="icon-sun" id="themeIcon"></div>
  </button>
</header>

<main>
  <section class="hero">
    <div class="eyebrow">
      <div class="eyebrow-dot" aria-hidden="true"></div>
      免费 · 无服务器 · 自动编译
    </div>
    <h1 class="hero-title">网页秒变<br>Android App</h1>
    <p class="hero-sub">填写网址和基本信息，自动打包成可安装的 APK 文件，3 到 5 分钟即可完成。</p>
  </section>

  <div class="card">
    <form class="form" id="form" novalidate>

      <div class="field">
        <label class="label" for="f_url">目标网址</label>
        <input class="input" type="url" id="f_url"
          placeholder="https://example.com" autocomplete="off" required>
      </div>

      <div class="field">
        <label class="label" for="f_name">App 名称</label>
        <input class="input" type="text" id="f_name"
          placeholder="我的应用" required>
      </div>

      <div class="field">
        <label class="label" for="f_pkg">包名</label>
        <input class="input" type="text" id="f_pkg"
          placeholder="com.example.myapp" required>
      </div>

      <div class="row">
        <div class="field">
          <label class="label" for="f_ver">版本号</label>
          <input class="input" type="text" id="f_ver"
            placeholder="1.0.0" value="1.0.0" required>
        </div>
        <div class="field">
          <label class="label" for="f_icon">图标 URL</label>
          <input class="input" type="url" id="f_icon"
            placeholder="https://…/icon.png" required>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <div class="btn-arrow" aria-hidden="true"></div>
        开始打包
      </button>

    </form>
  </div>

  <div class="status" id="statusBox">
    <div class="status-row">
      <div class="s-dot" id="sDot" aria-hidden="true"></div>
      <div>
        <div class="s-title" id="sTitle">等待中</div>
        <div class="s-sub"   id="sSub">正在初始化构建任务</div>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progFill"></div>
    </div>

    <div class="steps">
      <div class="step" id="st1">
        <div class="step-ico" aria-hidden="true"></div>
        触发构建任务
      </div>
      <div class="step" id="st2">
        <div class="step-ico" aria-hidden="true"></div>
        注入参数 &amp; 处理图标
      </div>
      <div class="step" id="st3">
        <div class="step-ico" aria-hidden="true"></div>
        Gradle 编译 APK
      </div>
      <div class="step" id="st4">
        <div class="step-ico" aria-hidden="true"></div>
        签名 &amp; 打包完成
      </div>
    </div>

    <div class="err" id="errBox"></div>
  </div>
</main>

<footer>
  APK 保留 7 天
  <span aria-hidden="true"></span>
  仅供侧载安装
  <span aria-hidden="true"></span>
  不可上架 Google Play
</footer>

<script>
/* ── Config ── */
const WORKER = 'https://a.456789666.workers.dev';

/* ── Theme ── */
const html = document.documentElement;
const btn  = document.getElementById('themeBtn');
const ico  = document.getElementById('themeIcon');
let theme  = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
applyTheme();

btn.addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
});
function applyTheme() {
  html.setAttribute('data-theme', theme);
  ico.className = theme === 'dark' ? 'icon-sun' : 'icon-moon';
  btn.setAttribute('aria-label', theme === 'dark' ? '切换浅色模式' : '切换深色模式');
}

/* ── Header shrink on scroll ── */
window.addEventListener('scroll', () => {
  document.getElementById('hdr').classList.toggle('scrolled', scrollY > 8);
}, { passive: true });

/* ── Ripple helper ── */
function addRipple(el, e) {
  const r = el.getBoundingClientRect();
  const rEl = document.createElement('span');
  rEl.className = 'ripple-el';
  rEl.style.left = (e.clientX - r.left) + 'px';
  rEl.style.top  = (e.clientY - r.top)  + 'px';
  el.appendChild(rEl);
  rEl.addEventListener('animationend', () => rEl.remove());
}
document.querySelectorAll('.btn,.btn-dl').forEach(b =>
  b.addEventListener('click', e => addRipple(b, e))
);

/* ── UI helpers ── */
const $  = id => document.getElementById(id);
let pollTimer = null;

function setProgress(p) { $('progFill').style.width = p + '%' }
function setDot(s)       { $('sDot').className = 's-dot ' + s }
function setTitle(t, s)  { $('sTitle').textContent = t; $('sSub').textContent = s }
function setStep(n, s)   {
  const el = $('st' + n);
  el.className = 'step ' + s;
}
function showErr(msg) {
  const e = $('errBox');
  e.textContent = msg;
  e.classList.add('show');
}
function hideErr() { $('errBox').classList.remove('show') }

function setBusy(v) {
  const b = $('submitBtn');
  b.disabled = v;
  b.innerHTML = v
    ? '<div class="spinner" aria-hidden="true"></div> 构建中'
    : '<div class="btn-arrow" aria-hidden="true"></div> 开始打包';
}

/* ── Form submit ── */
$('form').addEventListener('submit', async e => {
  e.preventDefault();
  clearInterval(pollTimer);
  hideErr();

  const data = {
    app_url:      $('f_url').value.trim(),
    app_name:     $('f_name').value.trim(),
    package_name: $('f_pkg').value.trim(),
    version_name: $('f_ver').value.trim(),
    icon_url:     $('f_icon').value.trim(),
  };

  for (const [k, v] of Object.entries(data)) {
    if (!v) { showErr('请填写所有字段后再提交。'); $('statusBox').classList.add('show'); return; }
  }
  const pkgRe = /^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*){2,}$/;
  if (!pkgRe.test(data.package_name)) {
    showErr('包名格式有误，示例：com.example.myapp'); $('statusBox').classList.add('show'); return;
  }

  setBusy(true);
  $('statusBox').classList.add('show');
  setDot('running'); setTitle('提交中', '正在触发 GitHub Actions…'); setProgress(6);

  try {
    const res  = await fetch(WORKER + '/build', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || '触发失败');

    setStep(1, 'done'); setStep(2, 'active'); setProgress(18);
    setTitle('排队中', '等待 GitHub Actions 启动…');
    startPoll(json.run_id);

  } catch (err) {
    showErr(err.message); setDot('fail'); setTitle('提交失败', ''); setBusy(false);
  }
});

/* ── Poll ── */
function startPoll(runId) {
  let elapsed = 0;
  pollTimer = setInterval(async () => {
    elapsed += 5;
    try {
      const r    = await fetch(WORKER + '/status?run_id=' + runId);
      const data = await r.json();
      const est  = Math.min(18 + Math.round(elapsed / 300 * 70), 88);

      if (data.status === 'in_progress') {
        setDot('running'); setTitle('构建中', '编译进行中，约需 3 到 5 分钟');
        setProgress(est);
        if (elapsed > 30)  { setStep(2, 'done'); setStep(3, 'active') }
        if (elapsed > 150) { setProgress(Math.max(est, 70)) }

      } else if (data.status === 'completed') {
        clearInterval(pollTimer);
        if (data.conclusion === 'success') {
          setStep(2,'done');setStep(3,'done');setStep(4,'done');
          setProgress(100);
          setDot('ok');
          setTitle('构建完成', 'APK 已就绪，可立即下载');
          showDownload(runId);
        } else {
          setDot('fail');
          setTitle('构建失败', '');
          showErr('构建失败，请检查包名格式及图标 URL 是否可公开访问。');
        }
        setBusy(false);
      }
    } catch(_) { /* 网络抖动，忽略 */ }
  }, 5000);
}

/* ── Download ── */
function showDownload(runId) {
  const old = document.getElementById('dlBtn');
  if (old) old.remove();
  const a = document.createElement('a');
  a.id = 'dlBtn'; a.className = 'btn-dl';
  a.href = WORKER + '/download?run_id=' + runId;
  a.innerHTML = '<div class="ico-dl" aria-hidden="true"></div> 下载 APK';
  a.addEventListener('click', e => addRipple(a, e));
  $('statusBox').appendChild(a);
}
</script>
